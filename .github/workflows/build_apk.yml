name: Patch TizenTube APK with VOT

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Устанавливаем Android SDK Build-Tools для доступа к zipalign и apksigner
      - name: Setup Android SDK Build-Tools
        run: |
          # Используем предустановленный Android SDK на GitHub Actions
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH
          
          # Принимаем лицензии автоматически
          yes | sdkmanager --licenses > /dev/null
          
          # Устанавливаем нужные build-tools
          sdkmanager "build-tools;34.0.0" > /dev/null
          
          # Экспортируем путь к zipalign и apksigner для следующих шагов workflow
          echo "$ANDROID_SDK_ROOT/build-tools/34.0.0" >> $GITHUB_PATH

      - name: Download apktool
        run: |
          curl -Lo apktool.jar https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar
          curl -Lo /usr/local/bin/apktool https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool
          chmod +x /usr/local/bin/apktool
          echo '#!/bin/bash' > /usr/local/bin/apktool
          echo 'java -jar /home/runner/work/TizenTubeCobalt_TestYATr/TizenTubeCobalt_TestYATr/apktool.jar "$@"' >> /usr/local/bin/apktool

      - name: Download latest TizenTubeCobalt APK
        run: |
          # Получаем прямую ссылку на APK из релизов с помощью jq
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/reisxd/TizenTubeCobalt/releases/latest \
            | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url' | head -n 1)
          
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "КРИТИЧЕСКАЯ ОШИБКА: Не удалось получить ссылку на APK из GitHub API!"
            exit 1
          fi
          
          echo "Скачиваем APK по ссылке: $DOWNLOAD_URL"
          curl -L -o tizentube.apk "$DOWNLOAD_URL"
          
          echo "=== Проверяем размер скачанного файла ==="
          ls -lh tizentube.apk
          
          # Если файл весит меньше 1 МБ, значит скачалось что-то не то
          FILE_SIZE=$(stat -c%s tizentube.apk)
          if [ "$FILE_SIZE" -lt 1000000 ]; then
            echo "КРИТИЧЕСКАЯ ОШИБКА: Скачанный файл подозрительно маленький ($FILE_SIZE байт). Возможно, это ошибка 404."
            cat tizentube.apk | head -n 20 || true
            exit 1
          fi
          
      - name: Decompile APK
        run: |
          java -jar apktool.jar d tizentube.apk -o apk_out -f

      - name: Inspect and Unpack Cobalt Assets
        run: |
          echo "=== 1. Скачиваем утилиту для работы с Chromium PAK ==="
          curl -sS https://raw.githubusercontent.com/chromium/chromium/main/tools/grit/grit/format/data_pack.py -o data_pack.py
          
          echo "=== 2. Пробуем извлечь строки и JS из cobalt_shell.pak ==="
          # Пишем простой встроенный скрипт на Python для чтения ресурсов
          python3 -c "
          import data_pack
          try:
              pack = data_pack.ReadDataPack('apk_out/assets/cobalt_shell.pak')
              print(f'Успешно прочитано ресурсов: {len(pack.resources)}')
              # Выведем первые 5 ресурсов для анализа (текстовые ли они)
              count = 0
              for res_id, res_data in pack.resources.items():
                  if count < 10 and b'console' in res_data or b'function' in res_data:
                      print(f'Ресурс ID {res_id} похож на JS/HTML, размер: {len(res_data)} байт')
                      count += 1
          except Exception as e:
              print('Ошибка чтения PAK:', e)
          "
