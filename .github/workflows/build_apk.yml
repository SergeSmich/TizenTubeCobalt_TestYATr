name: Build TizenTube APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r25c
        run: |
          sdkmanager "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ninja-build python3-pip curl

      - name: Download depot_tools
        run: |
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$PWD/depot_tools" >> $GITHUB_PATH

      - name: Generate build files (GN)
        run: |
          python3 tools/download_from_gcs.py --bucket cobalt-build-dependencies \
            || true
          gn gen out/android-arm64_devel \
            --args='target_os="android" target_cpu="arm64" build_type="devel"'

      - name: Build APK
        run: |
          ninja -C out/android-arm64_devel coat

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TizenTubeCobalt-arm64-debug
          path: out/android-arm64_devel/coat.apk
          retention-days: 30
