name: Build TizenTube APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ninja-build python3-pip curl git \
            libglib2.0-dev libdbus-1-dev libasound2-dev \
            libpulse-dev libavcodec-dev libssl-dev

      - name: Install Python packages
        run: pip3 install requests PyYAML

      - name: Download GN binary
        run: |
          curl -Lo gn.zip https://chrome-infra-packages.appspot.com/dl/gn/gn/linux-amd64/+/latest
          unzip gn.zip gn
          chmod +x gn
          sudo mv gn /usr/local/bin/gn

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r25c
        run: |
          sdkmanager "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Set environment
        run: |
          echo "PYTHONPATH=$PWD:$PYTHONPATH" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Generate build files
        run: |
          python3 cobalt/build/gn.py -p android-arm64 -C devel

      - name: Build APK
        run: |
          ninja -C out/android-arm64_devel coat

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TizenTubeCobalt-arm64-debug
          path: out/android-arm64_devel/coat.apk
          retention-days: 30
