- name: Inject VOT into Cobalt Pak Resource
        run: |
          echo "=== Внедрение финального JS-моста перевода в cobalt_shell.pak ==="
          python3 -c "
          import struct
          import os

          pak_path = 'apk_out/assets/cobalt_shell.pak'
          
          # Настоящий рабочий JS-код (VOT Bridge для Cobalt)
          vot_js = b'''
          (function(){
              console.log('=== VOT COBALT ENGINE STARTED ===');
              
              // Функция ручной сборки Protobuf (Тег 3: URL видео)
              function buildVotProto(videoUrl) {
                  var encoder = new TextEncoder();
                  var urlBytes = encoder.encode(videoUrl);
                  var proto = [];
                  
                  // Пишем тег 3 (wire type 2 - length delimited) -> (3 << 3) | 2 = 26
                  proto.push(26);
                  
                  // Пишем длину строки (Varint32)
                  var len = urlBytes.length;
                  while (len > 127) {
                      proto.push((len & 127) | 128);
                      len >>>= 7;
                  }
                  proto.push(len);
                  
                  // Пишем саму строку URL
                  for (var i = 0; i < urlBytes.length; i++) {
                      proto.push(urlBytes[i]);
                  }
                  return new Uint8Array(proto);
              }

              // Основная функция запроса перевода через публичный воркер
              async function requestTranslation(videoUrl) {
                  var workerUrl = 'https://vot-worker.kload.workers.dev/video-translation/translate';
                  var bodyData = buildVotProto(videoUrl);
                  
                  try {
                      var response = await fetch(workerUrl, {
                          method: 'POST',
                          headers: {
                              'Content-Type': 'application/x-protobuf',
                              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                          },
                          body: bodyData
                      });
                      
                      if (!response.ok) return null;
                      
                      // Читаем бинарный ответ от воркера (в нем ссылка на MP3 от Яндекса)
                      var buffer = await response.arrayBuffer();
                      var resBytes = new Uint8Array(buffer);
                      
                      // Легковесный парсинг ссылки на MP3 (ищем http/https маркер в бинарнике)
                      var resStr = new TextDecoder().decode(resBytes);
                      var urlMatch = resStr.match(/https:\\/\\/[^\\\\s\\\"\\']+\\.mp3/);
                      
                      return urlMatch ? urlMatch[0] : null;
                  } catch (e) {
                      console.error('VOT Fetch Error:', e);
                      return null;
                  }
              }

              // Кастомный плеер для наложения звука перевода поверх YouTube
              var votAudio = new Audio();
              votAudio.volume = 1.0;

              // Интервал для отслеживания смены видео в интерфейсе YouTube TV
              setInterval(async function() {
                  var currentUrl = window.location.href;
                  if (currentUrl.includes('watch?v=') && window.lastVotUrl !== currentUrl) {
                      window.lastVotUrl = currentUrl;
                      console.log('Обнаружено новое видео:', currentUrl);
                      
                      var audioUrl = await requestTranslation(currentUrl);
                      if (audioUrl) {
                          console.log('Перевод найден, запускаем дорожку:', audioUrl);
                          votAudio.src = audioUrl;
                          
                          // Синхронизируем старт с основным видео плеером YouTube
                          var ytVideo = document.querySelector('video');
                          if (ytVideo) {
                              votAudio.currentTime = ytVideo.currentTime;
                              if (!ytVideo.paused) votAudio.play();
                              
                              ytVideo.onplay = () => votAudio.play();
                              ytVideo.onpause = () => votAudio.pause();
                              ytVideo.onseeking = () => votAudio.currentTime = ytVideo.currentTime;
                          }
                      }
                  }
              }, 3000);
          })();
          '''

          if not os.path.exists(pak_path):
              print('Ошибка: cobalt_shell.pak не найден!')
              exit(1)

          with open(pak_path, 'rb') as f:
              data = f.read()

          version = struct.unpack('<I', data[:4])[0]
          resource_count = struct.unpack('<I', data[8:12])[0]
          header_size = 12 if version == 5 else 9
          entry_size = 6 if version == 4 else 8

          # Ищем смещения для ресурса 31000
          target_offset = None
          target_len = None
          idx = header_size

          for _ in range(resource_count):
              if version == 4:
                  res_id, offset = struct.unpack('<HI', data[idx:idx+6])
              else:
                  res_id, offset = struct.unpack('<II', data[idx:idx+8])
              
              if res_id == 31000:
                  idx_next = idx + entry_size
                  if version == 4:
                      _, next_offset = struct.unpack('<HI', data[idx_next:idx_next+6])
                  else:
                      _, next_offset = struct.unpack('<II', data[idx_next:idx_next+8])
                  
                  target_offset = offset
                  target_len = next_offset - offset
                  break
              idx += entry_size

          if target_offset and target_len:
              print(f'Ресурс 31000 успешно локализован. Смещение: {target_offset}, Длина: {target_len}')
              
              orig_js = data[target_offset:target_offset+target_len]
              patched_js = orig_js + vot_js
              delta = len(patched_js) - target_len

              new_data = bytearray(data[:target_offset]) + patched_js + data[target_offset+target_len:]
              
              # Пересчитываем указатели смещений в заголовке PAK
              idx = header_size
              for _ in range(resource_count + 1):
                  if version == 4:
                      res_id, offset = struct.unpack('<HI', new_data[idx:idx+6])
                      if offset > target_offset:
                          new_data[idx+2:idx+6] = struct.pack('<I', offset + delta)
                  else:
                      res_id, offset = struct.unpack('<II', new_data[idx:idx+8])
                      if offset > target_offset:
                          new_data[idx+4:idx+8] = struct.pack('<I', offset + delta)
                  idx += entry_size

              with open(pak_path, 'wb') as f:
                  f.write(new_data)
              print('=== cobalt_shell.pak успешно модифицирован и собран! ===')
          else:
              print('Ресурс 31000 не найден в таблице индексов архива!')
              exit(1)
          "
