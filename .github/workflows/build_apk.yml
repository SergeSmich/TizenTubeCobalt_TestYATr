name: Patch TizenTube APK with VOT

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Устанавливаем Android SDK Build-Tools для доступа к zipalign и apksigner
      - name: Setup Android SDK Build-Tools
        run: |
          # Используем предустановленный Android SDK на GitHub Actions
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH
          
          # Принимаем лицензии автоматически
          yes | sdkmanager --licenses > /dev/null
          
          # Устанавливаем нужные build-tools
          sdkmanager "build-tools;34.0.0" > /dev/null
          
          # Экспортируем путь к zipalign и apksigner для следующих шагов workflow
          echo "$ANDROID_SDK_ROOT/build-tools/34.0.0" >> $GITHUB_PATH

      - name: Download apktool
        run: |
          curl -Lo apktool.jar https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar
          curl -Lo /usr/local/bin/apktool https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool
          chmod +x /usr/local/bin/apktool
          echo '#!/bin/bash' > /usr/local/bin/apktool
          echo 'java -jar /home/runner/work/TizenTubeCobalt_TestYATr/TizenTubeCobalt_TestYATr/apktool.jar "$@"' >> /usr/local/bin/apktool

      - name: Download latest TizenTubeCobalt APK
        run: |
          # Получаем прямую ссылку на APK из релизов с помощью jq
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/reisxd/TizenTubeCobalt/releases/latest \
            | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url' | head -n 1)
          
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "КРИТИЧЕСКАЯ ОШИБКА: Не удалось получить ссылку на APK из GitHub API!"
            exit 1
          fi
          
          echo "Скачиваем APK по ссылке: $DOWNLOAD_URL"
          curl -L -o tizentube.apk "$DOWNLOAD_URL"
          
          echo "=== Проверяем размер скачанного файла ==="
          ls -lh tizentube.apk
          
          # Если файл весит меньше 1 МБ, значит скачалось что-то не то
          FILE_SIZE=$(stat -c%s tizentube.apk)
          if [ "$FILE_SIZE" -lt 1000000 ]; then
            echo "КРИТИЧЕСКАЯ ОШИБКА: Скачанный файл подозрительно маленький ($FILE_SIZE байт). Возможно, это ошибка 404."
            cat tizentube.apk | head -n 20 || true
            exit 1
          fi
          
      - name: Decompile APK
        run: |
          java -jar apktool.jar d tizentube.apk -o apk_out -f
          echo "=== Корневая структура APK ==="
          ls -F apk_out/

      - name: Deep Exploration (Разведка структуры)
        run: |
          echo "=== 1. Проверка ВСЕХ файлов в assets ==="
          find apk_out/assets -type f | head -n 100 || echo "Папка assets пуста или отсутствует"
          
          echo "=== 2. Поиск любых HTML/JS файлов во всем проекте ==="
          find apk_out/ -type f \( -name "*.html" -o -name "*.js" -o -name "*.json" \) | head -n 50
          
          echo "=== 3. Поиск главного Activity в AndroidManifest ==="
          grep -oE 'android:name="[^"]+"' apk_out/AndroidManifest.xml | head -n 20
          
          echo "=== 4. Поиск WebView или Cobalt компонентов в Smali ==="
          find apk_out/smali* -type f \( -name "*WebView*" -o -name "*Cobalt*" -o -name "*Client*" \) | head -n 40
          
          echo "=== 5. Поиск методов загрузки URL или инжектов ==="
          grep -rn "loadUrl" apk_out/smali* | head -n 20 || echo "loadUrl не найден"
          grep -rn "evaluateJavascript" apk_out/smali* | head -n 20 || echo "evaluateJavascript не найден"

      # Временная заглушка, чтобы сборка не ломалась, пока мы ищем правильное место для интеграции
      - name: Create Dummy VOT File
        run: |
          mkdir -p apk_out/assets
          echo "// Ожидание логов разведки" > apk_out/assets/vot.js

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Recompile APK
        run: |
          java -jar apktool.jar b apk_out -o tizentube_vot_unsigned.apk
          echo "Recompiled APK:"
          ls -lh tizentube_vot_unsigned.apk

      - name: Zipalign APK
        run: |
          zipalign -v 4 tizentube_vot_unsigned.apk tizentube_vot_aligned.apk
          echo "Aligned APK:"
          ls -lh tizentube_vot_aligned.apk

      - name: Sign APK (V2/V3 Scheme)
        run: |
          apksigner sign \
            --ks debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --ks-key-alias androiddebugkey \
            --out tizentube_vot.apk \
            tizentube_vot_aligned.apk
          echo "Successfully Signed APK with V2 Scheme"
          ls -lh tizentube_vot.apk
          
      - name: Verify APK Signature
        run: |
          apksigner verify --verbose tizentube_vot.apk

      - name: Upload patched APK
        uses: actions/upload-artifact@v4
        with:
          name: TizenTubeCobalt-VOT
          path: tizentube_vot.apk
          retention-days: 30
