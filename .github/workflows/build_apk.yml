name: Patch TizenTube APK with VOT

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download apktool
        run: |
          curl -Lo apktool.jar \
            https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar

      - name: Download latest TizenTubeCobalt APK
        run: |
          API_JSON=$(curl -fsSL https://api.github.com/repos/reisxd/TizenTubeCobalt/releases/latest)
          APK_URL=$(python3 -c "import json,sys; d=json.loads(sys.argv[1]); urls=[a['browser_download_url'] for a in d.get('assets',[]) if a.get('name','').endswith('.apk')]; pref=[u for u in urls if u.endswith('cobalt-arm.apk')]; print((pref or urls)[0])" "$API_JSON")
          echo "Downloading: $APK_URL"
          curl -fL --retry 5 --retry-delay 2 -o tizentube.apk "$APK_URL"
          unzip -tq tizentube.apk
          ls -lh tizentube.apk

      - name: Decompile APK
        run: |
          java -jar apktool.jar d tizentube.apk -o apk_out -f

      - name: Copy VOT script to assets
        run: |
          mkdir -p apk_out/assets
          cp vot.js apk_out/assets/vot.js
          echo "VOT script copied: $(wc -c < apk_out/assets/vot.js) bytes"

      - name: Show assets candidates
        run: |
          echo "=== Largest files under assets ==="
          find apk_out/assets -type f -printf "%s %p\n" | sort -nr | head -40
          echo ""
          echo "=== JavaScript files under assets ==="
          find apk_out/assets -type f -name "*.js" -printf "%s %p\n" | sort -nr | head -20

      - name: Inject VOT into runtime JS bundle
        run: |
          python3 inject_vot_bundle.py apk_out/assets/vot.js apk_out/assets

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Recompile APK
        run: |
          java -jar apktool.jar b apk_out -o tizentube_vot_unsigned.apk
          ls -lh tizentube_vot_unsigned.apk

      - name: Align and sign APK
        run: |
          BT=$ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          $BT/zipalign -v 4 tizentube_vot_unsigned.apk tizentube_vot_aligned.apk
          $BT/apksigner sign \
            --ks debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out tizentube_vot.apk \
            tizentube_vot_aligned.apk
          ls -lh tizentube_vot.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TizenTubeCobalt-VOT
          path: tizentube_vot.apk
          retention-days: 30
