name: Patch TizenTube APK with VOT

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Устанавливаем Android SDK Build-Tools для доступа к zipalign и apksigner
      - name: Setup Android SDK Build-Tools
        run: |
          # Используем предустановленный Android SDK на GitHub Actions
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH
          
          # Принимаем лицензии автоматически
          yes | sdkmanager --licenses > /dev/null
          
          # Устанавливаем нужные build-tools
          sdkmanager "build-tools;34.0.0" > /dev/null
          
          # Экспортируем путь к zipalign и apksigner для следующих шагов workflow
          echo "$ANDROID_SDK_ROOT/build-tools/34.0.0" >> $GITHUB_PATH

      - name: Download apktool
        run: |
          curl -Lo apktool.jar https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar
          curl -Lo /usr/local/bin/apktool https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool
          chmod +x /usr/local/bin/apktool
          echo '#!/bin/bash' > /usr/local/bin/apktool
          echo 'java -jar /home/runner/work/TizenTubeCobalt_TestYATr/TizenTubeCobalt_TestYATr/apktool.jar "$@"' >> /usr/local/bin/apktool

      - name: Download latest TizenTubeCobalt APK
        run: |
          # Получаем прямую ссылку на APK из релизов с помощью jq
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/reisxd/TizenTubeCobalt/releases/latest \
            | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url' | head -n 1)
          
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "КРИТИЧЕСКАЯ ОШИБКА: Не удалось получить ссылку на APK из GitHub API!"
            exit 1
          fi
          
          echo "Скачиваем APK по ссылке: $DOWNLOAD_URL"
          curl -L -o tizentube.apk "$DOWNLOAD_URL"
          
          echo "=== Проверяем размер скачанного файла ==="
          ls -lh tizentube.apk
          
          # Если файл весит меньше 1 МБ, значит скачалось что-то не то
          FILE_SIZE=$(stat -c%s tizentube.apk)
          if [ "$FILE_SIZE" -lt 1000000 ]; then
            echo "КРИТИЧЕСКАЯ ОШИБКА: Скачанный файл подозрительно маленький ($FILE_SIZE байт). Возможно, это ошибка 404."
            cat tizentube.apk | head -n 20 || true
            exit 1
          fi
          
      - name: Decompile APK
        run: |
          java -jar apktool.jar d tizentube.apk -o apk_out -f

      - name: Inspect and Unpack Cobalt Assets (Pure Python)
        run: |
          echo "=== Парсинг cobalt_shell.pak на чистом Python ==="
          python3 -c "
          import struct
          import os

          pak_path = 'apk_out/assets/cobalt_shell.pak'
          if not os.path.exists(pak_path):
              print('Файл не найден!')
              exit(1)

          with open(pak_path, 'rb') as f:
              data = f.read()
              
          print(f'Размер архива: {len(data)} байт')
          
          # Читаем заголовок Chromium PAK v4/v5
          version = struct.unpack('<I', data[:4])[0]
          print(f'Версия формата PAK: {version}')
          
          # В зависимости от версии читаем количество ресурсов
          if version in [4, 5]:
              resource_count = struct.unpack('<I', data[8:12])[0]
              print(f'Найдено ресурсов внутри архива: {resource_count}')
              
              # Смещение до таблицы индексов
              header_size = 12 if version == 5 else 9
              
              # Пробежимся по первым 150 ресурсам и поищем текстовые/JS данные
              # Структура индекса: 2 байта ID (или 4 в v5) + 4 байта смещения
              entry_size = 6 if version == 4 else 8
              
              print('\n=== Анализ первых текстовых ресурсов ===')
              printed = 0
              idx = header_size
              
              for _ in range(resource_count):
                  if idx + entry_size > len(data): break
                  
                  if version == 4:
                      res_id, offset = struct.unpack('<HI', data[idx:idx+6])
                  else:
                      res_id, offset = struct.unpack('<II', data[idx:idx+8])
                      
                  idx += entry_size
                  
                  # Читаем следующее смещение для определения длины
                  if version == 4:
                      _, next_offset = struct.unpack('<HI', data[idx:idx+6])
                  else:
                      _, next_offset = struct.unpack('<II', data[idx:idx+8])
                      
                  res_len = next_offset - offset
                  
                  if offset < len(data) and (offset + res_len) <= len(data) and res_len > 0:
                      res_content = data[offset:offset+res_len]
                      
                      # Проверяем, содержит ли ресурс JS/HTML маркеры
                      if any(x in res_content for x in [b'function', b'window', b'console', b'yt']):
                          print(f'Ресурс ID: {res_id} | Размер: {res_len} байт | Тип: JS/HTML')
                          # Выведем начало скрипта для инспекции
                          print(f'Превью: {res_content[:150]}...\n' + '-'*40)
                          printed += 1
                          if printed >= 10: break
          "
