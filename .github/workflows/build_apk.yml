name: Patch TizenTube APK with VOT

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Устанавливаем Android SDK Build-Tools для доступа к zipalign и apksigner
      - name: Setup Android SDK Build-Tools
        run: |
          # Используем предустановленный Android SDK на GitHub Actions
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH
          
          # Принимаем лицензии автоматически
          yes | sdkmanager --licenses > /dev/null
          
          # Устанавливаем нужные build-tools
          sdkmanager "build-tools;34.0.0" > /dev/null
          
          # Экспортируем путь к zipalign и apksigner для следующих шагов workflow
          echo "$ANDROID_SDK_ROOT/build-tools/34.0.0" >> $GITHUB_PATH

      - name: Download apktool
        run: |
          curl -Lo apktool.jar https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar
          curl -Lo /usr/local/bin/apktool https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool
          chmod +x /usr/local/bin/apktool
          echo '#!/bin/bash' > /usr/local/bin/apktool
          echo 'java -jar /home/runner/work/TizenTubeCobalt_TestYATr/TizenTubeCobalt_TestYATr/apktool.jar "$@"' >> /usr/local/bin/apktool

      - name: Download latest TizenTubeCobalt APK
        run: |
          # Получаем прямую ссылку на APK из релизов с помощью jq
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/reisxd/TizenTubeCobalt/releases/latest \
            | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url' | head -n 1)
          
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "КРИТИЧЕСКАЯ ОШИБКА: Не удалось получить ссылку на APK из GitHub API!"
            exit 1
          fi
          
          echo "Скачиваем APK по ссылке: $DOWNLOAD_URL"
          curl -L -o tizentube.apk "$DOWNLOAD_URL"
          
          echo "=== Проверяем размер скачанного файла ==="
          ls -lh tizentube.apk
          
          # Если файл весит меньше 1 МБ, значит скачалось что-то не то
          FILE_SIZE=$(stat -c%s tizentube.apk)
          if [ "$FILE_SIZE" -lt 1000000 ]; then
            echo "КРИТИЧЕСКАЯ ОШИБКА: Скачанный файл подозрительно маленький ($FILE_SIZE байт). Возможно, это ошибка 404."
            cat tizentube.apk | head -n 20 || true
            exit 1
          fi
          
      - name: Decompile APK
        run: |
          java -jar apktool.jar d tizentube.apk -o apk_out -f

      - name: Create VOT Injection Payload
        run: |
          # Создаем чистый JS-код без лишних переносов строк для безопасного инжекта через Smali
          cat > vot_inline.js << 'VOTEOF'
          (function(){if(document.getElementById('vot-btn'))return;var b=document.createElement('button');b.id='vot-btn';b.textContent='🌐 Перевод';b.style.cssText='position:fixed;bottom:40px;left:40px;z-index:99999;padding:12px 24px;background:rgba(0,0,0,0.85);color:#fff;border:3px solid #fc0;border-radius:10px;font-size:20px;font-weight:bold;cursor:pointer;';b.onclick=function(){alert('VOT мост инициализирован в Cobalt!');};document.body.appendChild(b);})();
          VOTEOF
          
          # Кодируем JS в HEX, чтобы не сломать синтаксис Smali кавычками и спецсимволами
          HEX_JS=$(xxd -p -c 256 vot_inline.js | tr -d '\n')
          echo "HEX_JS=$HEX_JS" >> $GITHUB_ENV

      - name: Patch Cobalt JavaBridge (Smali Injection)
        run: |
          TARGET_SMALI="apk_out/smali_classes2/dev/cobalt/coat/javabridge/CobaltJavaScriptInterface.smali"
          
          if [ -f "$TARGET_SMALI" ]; then
            echo "Файл моста найден. Начинаем инжект..."
            
            # Нам нужно найти метод инициализации или конструктор. 
            # Добавим вызов кастомного лога или выполнение JS прямо в конец конструктора <init>
            
            # Декодируем наш JS на лету внутри Smali-кода через String (создаем костыль инициализации)
            # Для этого преобразуем HEX обратно в строку внутри Dalvik-кода
            
            # Находим строку возврата из конструктора и вставляем инжект кнопки
            # Для начала просто проверим, что файл поддается модификации:
            sed -i '/\.end method/i \    # VOT Injection Point' "$TARGET_SMALI"
            
            echo "Модификация Smali успешно завершена."
          else
            echo "КРИТИЧЕСКАЯ ОШИБКА: Целевой файл Smali не найден!"
            exit 1
          fi

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Recompile APK
        run: |
          java -jar apktool.jar b apk_out -o tizentube_vot_unsigned.apk

      - name: Zipalign APK
        run: |
          zipalign -v 4 tizentube_vot_unsigned.apk tizentube_vot_aligned.apk

      - name: Sign APK (V2/V3 Scheme)
        run: |
          apksigner sign \
            --ks debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --ks-key-alias androiddebugkey \
            --out tizentube_vot.apk \
            tizentube_vot_aligned.apk
          echo "Приложение успешно пересобрано и подписано."
          
      - name: Verify APK Signature
        run: |
          apksigner verify --verbose tizentube_vot.apk

      - name: Upload patched APK
        uses: actions/upload-artifact@v4
        with:
          name: TizenTubeCobalt-VOT
          path: tizentube_vot.apk
          retention-days: 30
