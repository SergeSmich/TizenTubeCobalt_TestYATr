name: Patch TizenTube APK with VOT

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download apktool
        run: |
          curl -Lo apktool.jar \
            https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar

      - name: Download latest TizenTubeCobalt APK
        run: |
          RELEASE_JSON=$(curl -s https://api.github.com/repos/reisxd/TizenTubeCobalt/releases/latest)
          echo "=== Release assets ==="
          echo "$RELEASE_JSON" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print('Tag:', data.get('tag_name'))
          for a in data.get('assets', []):
              print('Asset:', a['name'], '->', a['browser_download_url'])
          "
          APK_URL=$(echo "$RELEASE_JSON" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for a in data.get('assets', []):
              if a['name'].endswith('.apk'):
                  print(a['browser_download_url'])
                  break
          ")
          echo "Downloading: $APK_URL"
          curl -L -o tizentube.apk "$APK_URL"
          echo "=== APK info ==="
          ls -lh tizentube.apk
          file tizentube.apk

      - name: Decompile APK
        run: |
          java -jar apktool.jar d tizentube.apk -o apk_out -f

      - name: Copy VOT script to assets
        run: |
          mkdir -p apk_out/assets
          cp vot.js apk_out/assets/vot.js
          echo "VOT script copied: $(wc -c < apk_out/assets/vot.js) bytes"

      - name: Show smali structure
        run: |
          echo "=== CobaltActivity smali files ==="
          find apk_out/smali* -name "CobaltActivity*.smali" 2>/dev/null
          echo ""
          echo "=== CobaltActivity\$2 content ==="
          SMALI=$(find apk_out/smali* -name "CobaltActivity\$2.smali" | head -1)
          cat "$SMALI"

      - name: Patch smali
        run: |
          SMALI=$(find apk_out/smali* -name "CobaltActivity\$2.smali" | head -1)
          echo "Patching: $SMALI"
          python3 patch_smali.py "$SMALI"

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Recompile APK
        run: |
          java -jar apktool.jar b apk_out -o tizentube_vot_unsigned.apk
          ls -lh tizentube_vot_unsigned.apk

      - name: Align and sign APK
        run: |
          BT=$ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          $BT/zipalign -v 4 tizentube_vot_unsigned.apk tizentube_vot_aligned.apk
          $BT/apksigner sign \
            --ks debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out tizentube_vot.apk \
            tizentube_vot_aligned.apk
          ls -lh tizentube_vot.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TizenTubeCobalt-VOT
          path: tizentube_vot.apk
          retention-days: 30
