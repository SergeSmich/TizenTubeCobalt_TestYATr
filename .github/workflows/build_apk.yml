name: Build TizenTube APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ninja-build

      - name: Install Python deps
        run: pip install requests

      - name: Download depot_tools
        run: |
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$PWD/depot_tools" >> $GITHUB_PATH

      - name: Set up Android SDK/NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r21e
        run: |
          sdkmanager "ndk;21.4.7075529"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/21.4.7075529" >> $GITHUB_ENV

      - name: Configure build (arm64 debug)
        run: |
          python3 cobalt/build/gyp_cobalt android-arm64 -C devel

      - name: Build APK
        run: |
          ninja -C out/android-arm64_devel coat

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TizenTubeCobalt-arm64-debug
          path: out/android-arm64_devel/coat.apk
          retention-days: 30
